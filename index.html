<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Chote ❤️</title>
    <style>
        body { background-color: #ffe4e1; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; text-align: center; overflow: hidden; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 300px; border: 2px solid #ff6b6b; position: relative; z-index: 10; }
        h1 { color: #ff6b6b; font-size: 22px; }
        p { color: #555; font-size: 18px; line-height: 1.4; }
        .btn { background: #ff6b6b; color: white; padding: 12px 24px; border: none; border-radius: 25px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 15px; font-weight: bold; }
        @keyframes fall { 0% { transform: translateY(-10vh); } 100% { transform: translateY(110vh); } }
        .heart { position: fixed; color: #ff6b6b; font-size: 20px; animation: fall 3s linear infinite; z-index: 1; }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size: 60px; margin-bottom: 10px;">🐷💖</div>
        <h1>Sorry Na Chote!</h1>
        <p>Oye meri pyaari <b>Chote</b>... Maan ja na ab! <br><br> Maana ki main thoda pagal hoon, par tera favourite <b>Suvar</b> toh main hi hoon na? 🐽</p>
        <a href="#" class="btn" onclick="alert('I Love You Chote! ❤️ Ab smile karo!')">Maan Gayi? Click Karo!</a>
    </div>
    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 3000);
        }
        setInterval(createHeart, 300);
    </script>
</body>
</html>
